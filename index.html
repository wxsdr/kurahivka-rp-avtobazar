<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АВТОБАЗАР У АШОТА | Kurahivka RP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --neon-gold: #ffb703; --neon-red: #d90429; --neon-green: #00f5d4; --discord-color: #5865F2; 
            --dark-bg: #0b0c10; --glass-bg: rgba(20, 22, 28, 0.75); --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(255, 183, 3, 0.15) 0%, transparent 50%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: #ffffff; font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px;
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- КРУТЫЕ УВЕДОМЛЕНИЯ (TOASTS) --- */
        .toast-container { position: fixed; top: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 15px; pointer-events: none; }
        .toast {
            background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            color: white; padding: 18px 25px; border-radius: 16px; font-weight: 700; font-family: 'Montserrat', sans-serif;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); transform: translateX(120%); opacity: 0; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 15px; 
            min-width: 320px; border-left: 6px solid transparent; pointer-events: auto;
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.error { border-left-color: var(--neon-red); box-shadow: 0 10px 30px rgba(217, 4, 41, 0.3); }
        .toast.success { border-left-color: var(--neon-green); box-shadow: 0 10px 30px rgba(0, 245, 212, 0.3); }
        .toast.warning { border-left-color: var(--neon-gold); box-shadow: 0 10px 30px rgba(255, 183, 3, 0.3); }
        .toast-icon { font-size: 24px; text-shadow: 0 0 10px currentColor; }
        .toast-text { font-size: 14px; line-height: 1.4; }

        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; text-align: center; animation: fadeIn 0.8s ease; }
        #loginScreen h1 { font-size: 4.5em; margin-bottom: 10px; font-weight: 900; background: linear-gradient(90deg, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #loginScreen p { color: #aaa; font-size: 1.2em; letter-spacing: 2px; margin-bottom: 40px; text-transform: uppercase; font-weight: bold; }
        
        #mainContent { display: none; animation: fadeIn 0.5s ease; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--glass-bg); padding: 15px 25px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .add-car-btn { background: linear-gradient(45deg, var(--neon-green), #00b4d8); color: black; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 900; font-family: 'Montserrat'; cursor: pointer; transition: 0.3s; text-transform: uppercase; display: flex; align-items: center; gap: 8px;}
        .add-car-btn:hover { box-shadow: 0 0 25px rgba(0, 245, 212, 0.5); transform: translateY(-2px); }
        
        .user-info { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.4); padding: 8px 20px 8px 8px; border-radius: 50px; border: 1px solid rgba(88, 101, 242, 0.3); }
        .user-info img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--discord-color); }
        .user-info span { font-weight: bold; font-size: 14px; color: white; }
        
        .auth-btn { background: var(--discord-color); color: white; border: none; padding: 15px 35px; border-radius: 15px; cursor: pointer; font-weight: 900; font-size: 1.1em; font-family: 'Montserrat'; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; box-shadow: 0 10px 30px rgba(88, 101, 242, 0.2); }
        .auth-btn:hover { background: #4752C4; box-shadow: 0 15px 40px rgba(88, 101, 242, 0.5); transform: translateY(-3px); }
        .auth-btn svg { width: 24px; fill: white; }
        .auth-btn.logout { background: transparent; color: var(--neon-red); border: 1px solid var(--neon-red); padding: 8px 15px; font-size: 12px; border-radius: 8px; box-shadow: none; }
        .auth-btn.logout:hover { background: var(--neon-red); color: white; box-shadow: 0 0 20px rgba(217, 4, 41, 0.5); transform: none; }

        header { text-align: center; margin-bottom: 50px; position: relative; }
        h1 { font-weight: 900; font-size: 4em; margin: 0; text-transform: uppercase; letter-spacing: 4px; background: linear-gradient(90deg, var(--neon-gold), #ff5400); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0px 0px 40px rgba(255, 183, 3, 0.3); font-style: italic; }
        .subtitle { color: #888; font-size: 1.2em; letter-spacing: 2px; margin-top: 10px; font-weight: bold; }

        .controls-wrapper { max-width: 1200px; margin: 0 auto 40px auto; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .tabs { display: flex; gap: 10px; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 15px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); }
        .tab-btn { background: transparent; color: #aaa; border: none; padding: 12px 30px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.4s; font-family: 'Montserrat', sans-serif; }
        .tab-btn.active { background: var(--neon-gold); color: #000; box-shadow: 0 0 20px rgba(255, 183, 3, 0.4); }
        .filter-toggle-btn { background: var(--glass-bg); color: white; padding: 12px 30px; border: 1px solid var(--glass-border); border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: bold; backdrop-filter: blur(10px); transition: 0.3s; }
        .filter-toggle-btn:hover { border-color: var(--neon-gold); color: var(--neon-gold); box-shadow: 0 0 15px rgba(255, 183, 3, 0.2); }

        .filter-panel { display: none; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 35px; width: 100%; max-width: 800px; grid-template-columns: 1fr 1fr; gap: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); box-sizing: border-box; }
        .filter-panel.active { display: grid; animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .filter-group label { display: block; margin-bottom: 12px; color: #ccc; font-size: 12px; text-transform: uppercase; font-weight: 900; letter-spacing: 1px;}
        .filter-group select, .filter-group input { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: bold; box-sizing: border-box; transition: 0.3s; }
        .filter-group select:focus, .filter-group input:focus { outline: none; border-color: var(--neon-gold); background: rgba(0,0,0,0.8); box-shadow: 0 0 15px rgba(255, 183, 3, 0.2); }
        .price-inputs { display: flex; gap: 15px; }
        
        .filter-actions { grid-column: span 2; display: flex; gap: 15px; margin-top: 15px; }
        .apply-filters-btn { flex: 1; background: linear-gradient(45deg, #ff5400, var(--neon-gold)); color: black; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: 900; font-size: 16px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .apply-filters-btn:hover { box-shadow: 0 0 30px rgba(255, 183, 3, 0.5); transform: translateY(-2px); }
        .reset-filters-btn { background: transparent; color: white; border: 1px solid var(--neon-red); padding: 16px; border-radius: 12px; cursor: pointer; font-weight: 900; font-size: 16px; transition: 0.3s; text-transform: uppercase; }
        .reset-filters-btn:hover { background: var(--neon-red); box-shadow: 0 0 20px rgba(217, 4, 41, 0.4); }

        .car-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 35px; max-width: 1300px; margin: 0 auto; }
        .car-card { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .car-card:hover { transform: translateY(-12px); border-color: var(--neon-gold); box-shadow: 0 20px 50px rgba(255, 183, 3, 0.2); }
        .car-image-wrapper { position: relative; border-radius: 15px; overflow: hidden; margin-bottom: 20px; height: 220px; background: #000; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        
        .car-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease, filter 0.6s ease; filter: brightness(0.7); }
        .car-card:hover img { transform: scale(1.08); filter: brightness(1.1); }

        .condition-badge { position: absolute; top: 15px; left: 15px; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; backdrop-filter: blur(10px); z-index: 2;}
        .badge-new { background: rgba(0, 245, 212, 0.2); color: var(--neon-green); border: 1px solid var(--neon-green); box-shadow: 0 0 10px rgba(0, 245, 212, 0.3); }
        .badge-used { background: rgba(255, 183, 3, 0.2); color: var(--neon-gold); border: 1px solid var(--neon-gold); box-shadow: 0 0 10px rgba(255, 183, 3, 0.3); }
        .class-badge { position: absolute; top: 15px; right: 15px; background: rgba(0, 0, 0, 0.8); padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 900; border: 1px solid #555; color: #fff; z-index: 2;}

        .car-card h3 { margin: 0 0 15px 0; font-size: 1.5em; font-weight: 900; letter-spacing: 1px; line-height: 1.2; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .car-stats { display: flex; justify-content: space-between; font-size: 0.85em; color: #bbb; margin-bottom: 20px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; font-weight: bold; border: 1px solid rgba(255,255,255,0.05); }
        .car-card .price { color: var(--neon-green); font-size: 1.8em; font-weight: 900; margin-bottom: 25px; text-shadow: 0 0 15px rgba(0, 245, 212, 0.4); text-align: center; }

        .action-buttons { display: flex; gap: 12px; margin-top: auto; }
        .buy-btn { flex: 1; background: transparent; color: white; border: 2px solid var(--neon-gold); padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 900; font-size: 14px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .buy-btn:hover { background: var(--neon-gold); color: black; box-shadow: 0 0 25px rgba(255, 183, 3, 0.5); transform: scale(1.02); }
        .delete-btn { background: transparent; color: var(--neon-red); border: 2px solid var(--neon-red); padding: 14px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .delete-btn:hover { background: var(--neon-red); color: white; box-shadow: 0 0 20px rgba(217, 4, 41, 0.5); transform: scale(1.05); }
        
        .owner-tag { font-size: 12px; color: #888; text-align: center; margin-top: 15px; font-weight: bold; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }

        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.6s ease forwards; }

        /* Модальні вікна (Додавання авто та Підтвердження) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 1000; justify-content: center; align-items: center; overflow-y: auto;}
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        .modal-content { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); margin: 20px auto; position: relative;}
        .modal-content::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, var(--neon-gold), var(--neon-red)); border-radius: 24px 24px 0 0; }
        .modal-content h3 { margin-top: 0; margin-bottom: 25px; color: white; font-weight: 900; font-size: 1.8em; letter-spacing: 1px; }
        .modal-content input, .modal-content select { width: 100%; padding: 15px; margin: 8px 0; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; box-sizing: border-box; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .modal-content input:focus, .modal-content select:focus { outline: none; border-color: var(--neon-gold); background: rgba(0,0,0,0.9); box-shadow: 0 0 15px rgba(255, 183, 3, 0.2); }
        .modal-content button { width: 100%; padding: 16px; margin-top: 15px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; font-family: 'Montserrat', sans-serif; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; font-size: 15px; }
        .confirm-btn { background: linear-gradient(45deg, var(--neon-gold), #ff8c00); color: black; box-shadow: 0 10px 20px rgba(255, 183, 3, 0.3); }
        .confirm-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(255, 183, 3, 0.5); }
        .cancel-btn { background: transparent; border: 2px solid #555; color: white; }
        .cancel-btn:hover { border-color: var(--neon-red); color: var(--neon-red); background: rgba(217, 4, 41, 0.1); }

        .img-hint { font-size: 12px; color: #aaa; text-align: left; margin: 15px 0 25px 5px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; border-left: 3px solid var(--neon-gold); }
        .img-hint a { color: var(--neon-gold); text-decoration: none; font-weight: 900; }
        .img-hint a:hover { text-decoration: underline; text-shadow: 0 0 10px var(--neon-gold); }
        
        /* Стиль для кастомного Confirm */
        #confirmMessage { font-size: 1.2em; margin-bottom: 30px; font-weight: bold; line-height: 1.5; color: #ddd; }
        .confirm-actions { display: flex; gap: 15px; }
        .confirm-actions .confirm-btn { background: var(--neon-red); color: white; box-shadow: 0 10px 20px rgba(217, 4, 41, 0.3); margin-top: 0; }
        .confirm-actions .confirm-btn:hover { box-shadow: 0 15px 30px rgba(217, 4, 41, 0.5); }
        .confirm-actions .cancel-btn { margin-top: 0; }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div id="loginScreen">
        <h1>KURAHIVKA RP</h1>
        <p>Для доступу до автобазару потрібна авторизація</p>
        <button class="auth-btn" onclick="signInWithDiscord()">
            <svg viewBox="0 0 127.14 96.36">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15ZM42.56,65.36c-5.36,0-9.72-4.86-9.72-10.82s4.25-10.82,9.72-10.82c5.49,0,9.79,4.89,9.72,10.82C52.28,60.5,48.05,65.36,42.56,65.36Zm42.24,0c-5.36,0-9.72-4.86-9.72-10.82s4.25-10.82,9.72-10.82c5.49,0,9.79,4.89,9.72,10.82C84.8,60.5,80.57,65.36,84.8,65.36Z"/>
            </svg>
            Увійти через Discord
        </button>
    </div>

    <div id="mainContent">
        <div class="top-bar">
            <button class="add-car-btn" onclick="openAddCarModal()">➕ Продати своє авто</button>
            <div id="userInfo" class="user-info">
                <img id="userAvatar" src="" alt="Avatar">
                <span id="userName"></span>
                <button class="auth-btn logout" onclick="signOut()">Вийти</button>
            </div>
        </div>

        <header>
            <h1>АВТОБАЗАР У АШОТА</h1>
            <div class="subtitle">НАЙКРАЩІ ТАЧКИ ДЛЯ KURAHIVKA RP</div>
        </header>

        <div class="controls-wrapper">
            <div class="tabs">
                <button class="tab-btn active" onclick="filterConditionTab('all', this)">Всі авто</button>
                <button class="tab-btn" onclick="filterConditionTab('new', this)">Нові з салону</button>
                <button class="tab-btn" onclick="filterConditionTab('used', this)">Вживані (Б/У)</button>
            </div>
            <button class="filter-toggle-btn" onclick="toggleFilters()">⚙️ Детальні фільтри</button>

            <div class="filter-panel" id="filterPanel">
                <div class="filter-group">
                    <label>Марка авто:</label>
                    <select id="filterBrand">
                        <option value="all">Всі марки</option>
                        <option value="BMW">BMW</option>
                        <option value="Toyota">Toyota</option>
                        <option value="Porsche">Porsche</option>
                        <option value="Mercedes">Mercedes</option>
                        <option value="Audi">Audi</option>
                        <option value="Other">Інше</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Тип кузова:</label>
                    <select id="filterBody">
                        <option value="all">Всі типи</option>
                        <option value="sedan">Седан</option>
                        <option value="coupe">Купе</option>
                        <option value="suv">Позашляховик</option>
                    </select>
                </div>
                <div class="filter-group"><label>Ціна ($):</label><div class="price-inputs"><input type="number" id="filterPriceMin" placeholder="Від"><input type="number" id="filterPriceMax" placeholder="До"></div></div>
                <div class="filter-group">
                    <label>Клас авто:</label>
                    <select id="filterClass">
                        <option value="all">Будь-який</option>
                        <option value="premium">Преміум</option>
                        <option value="business">Бізнес</option>
                        <option value="sport">Спорт</option>
                        <option value="economy">Економ</option>
                    </select>
                </div>
                <div class="filter-actions">
                    <button class="apply-filters-btn" onclick="applyFilters()">ЗНАЙТИ ТАЧКУ</button>
                    <button class="reset-filters-btn" onclick="resetFilters()">СКИНУТИ</button>
                </div>
            </div>
        </div>

        <main class="car-container" id="carGrid"></main>
    </div>

    <div id="addCarModal" class="modal">
        <div class="modal-content">
            <h3>ДОДАТИ АВТО НА БАЗАР</h3>
            <input type="text" id="newCarName" placeholder="Назва (напр. BMW M5 F90)">
            
            <div id="photoInputsContainer">
                <input type="text" class="car-photo-input" placeholder="Головне фото (з'явиться в каталозі)">
            </div>
            <button type="button" id="addPhotoBtn" onclick="addPhotoField()" style="background: rgba(0,0,0,0.4); border: 1px dashed var(--neon-gold); color: var(--neon-gold); font-size: 13px; padding: 12px; margin-top: 10px; box-shadow: none;">➕ ДОДАТИ ЩЕ ФОТО (1/10)</button>

            <div class="img-hint">
                💡 Немає посилання? Завантаж фото на <a href="https://imgbb.com/" target="_blank">imgbb.com</a> та встав сюди.
            </div>
            
            <input type="number" id="newCarPrice" placeholder="Ціна в доларах ($)">
            <input type="number" id="newCarSpeed" placeholder="Макс. швидкість (км/год)">
            <input type="number" id="newCarTrunk" placeholder="Місткість багажника (кг)">
            
            <select id="newCarCondition">
                <option value="new">Стан: З салону</option>
                <option value="used">Стан: Вживана (Б/У)</option>
            </select>
            <select id="newCarBrand">
                <option value="BMW">Марка: BMW</option>
                <option value="Toyota">Марка: Toyota</option>
                <option value="Porsche">Марка: Porsche</option>
                <option value="Mercedes">Марка: Mercedes</option>
                <option value="Audi">Марка: Audi</option>
                <option value="Other">Марка: Інше</option>
            </select>
            <select id="newCarBody">
                <option value="sedan">Кузов: Седан</option>
                <option value="coupe">Кузов: Купе</option>
                <option value="suv">Кузов: Позашляховик</option>
            </select>
            <select id="newCarClass">
                <option value="premium">Клас: Преміум</option>
                <option value="business">Клас: Бізнес</option>
                <option value="sport">Клас: Спорт</option>
                <option value="economy">Клас: Економ</option>
            </select>

            <button class="confirm-btn" onclick="submitNewCar()">ВИСТАВИТИ НА ПРОДАЖ</button>
            <button class="cancel-btn" onclick="closeAddCarModal()">СКАСУВАТИ</button>
        </div>
    </div>

    <div id="customConfirmModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <h3 style="color: var(--neon-red);">УВАГА!</h3>
            <div id="confirmMessage">Точно видалити це авто з базару?</div>
            <div class="confirm-actions">
                <button class="confirm-btn" id="confirmYesBtn">ТАК, ВИДАЛИТИ</button>
                <button class="cancel-btn" id="confirmNoBtn">СКАСУВАТИ</button>
            </div>
        </div>
    </div>

    <script>
        // Премиальная система уведомлений (Toasts)
        function showNotification(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = '❌';
            if (type === 'success') icon = '✅';
            if (type === 'warning') icon = '⚠️';
            if (type === 'info') icon = '💡';

            toast.innerHTML = `
                <div class="toast-icon">${icon}</div>
                <div class="toast-text">${message}</div>
            `;
            container.appendChild(toast);
            
            // Анимация появления
            requestAnimationFrame(() => {
                setTimeout(() => toast.classList.add('show'), 10);
            });

            // Автоматическое удаление
            setTimeout(() => { 
                toast.classList.remove('show'); 
                setTimeout(() => toast.remove(), 500); 
            }, 4500);
        }

        // Кастомная замена стандартного confirm()
        function showCustomConfirm(message, onConfirm) {
            const modal = document.getElementById('customConfirmModal');
            document.getElementById('confirmMessage').innerText = message;
            modal.classList.add('active');

            const yesBtn = document.getElementById('confirmYesBtn');
            const noBtn = document.getElementById('confirmNoBtn');

            yesBtn.onclick = function() {
                modal.classList.remove('active');
                onConfirm();
            };
            noBtn.onclick = function() {
                modal.classList.remove('active');
            };
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCbNGyrjT1rf-2UHeRj2LCCdqIrsaZ0TG0",
            authDomain: "kurahivka-rp-avtobazar.firebaseapp.com",
            databaseURL: "https://kurahivka-rp-avtobazar-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kurahivka-rp-avtobazar",
            storageBucket: "kurahivka-rp-avtobazar.firebasestorage.app",
            messagingSenderId: "405277187723",
            appId: "1:405277187723:web:c29a83d4a2ae3630643e8e"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.OAuthProvider('oidc.discord');
        provider.addScope('identify');

        const ADMIN_UID = "ТВІЙ_UID_СЮДИ_ЯКЩО_ТРЕБА"; 

        let currentUser = null;
        let currentCarsData = {};
        const COOLDOWN_SEC = 5; 

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('userAvatar').src = user.photoURL || 'https://cdn.discordapp.com/embed/avatars/0.png';
                document.getElementById('userName').innerText = user.displayName;
                showNotification(`Ласкаво просимо, ${user.displayName}!`, 'info');
            } else {
                currentUser = null;
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            }
            renderCars();
        });

        function signInWithDiscord() {
            auth.signInWithPopup(provider).then(() => { showNotification('Успішний вхід через Discord!', 'success'); }).catch((e) => { showNotification('Помилка: ' + e.message, 'error'); });
        }
        function signOut() { auth.signOut(); showNotification('Ви вийшли з аккаунту', 'info'); }
        
        function checkCooldown() {
            const lastAction = localStorage.getItem('lastActionTime');
            if (lastAction) {
                const diff = (new Date().getTime() - parseInt(lastAction)) / 1000;
                if (diff < COOLDOWN_SEC) { showNotification(`Зачекай ще ${Math.ceil(COOLDOWN_SEC - diff)} сек.!`, 'warning'); return false; }
            }
            return true;
        }
        function setCooldown() { localStorage.setItem('lastActionTime', new Date().getTime().toString()); }

        database.ref('cars').on('value', (snapshot) => {
            currentCarsData = snapshot.val() || {};
            renderCars();
        });

        function renderCars() {
            const grid = document.getElementById('carGrid');
            grid.innerHTML = ''; 

            for (const [carId, carData] of Object.entries(currentCarsData)) {
                const card = document.createElement('div');
                card.className = 'car-card fade-in';
                card.id = carId;
                card.setAttribute('data-condition', carData.condition);
                card.setAttribute('data-brand', carData.brand);
                card.setAttribute('data-body', carData.body);
                card.setAttribute('data-price', carData.price);
                card.setAttribute('data-class', carData.carClass);

                const conditionText = carData.condition === 'new' ? 'З салону' : 'Вживана (Б/У)';
                const conditionClass = carData.condition === 'new' ? 'badge-new' : 'badge-used';
                
                // Перевірка прав на видалення
                const canDelete = currentUser && (currentUser.providerData && currentUser.providerData[0] && currentUser.providerData[0].uid === carData.ownerId || currentUser.uid === carData.ownerId || currentUser.uid === ADMIN_UID);
                
                // Используем нашу новую функцию showCustomConfirm вместо стандартного confirm
                let deleteBtnHtml = canDelete ? `<button class="delete-btn" onclick="event.stopPropagation(); showCustomConfirm('Ви впевнені, що хочете назавжди видалити це оголошення?', function() { deleteCar('${carId}') })">🗑️</button>` : '';

                const detailUrl = `car.html?id=${carId}`;
                const mainImage = (carData.images && carData.images.length > 0) ? carData.images[0] : (carData.image || 'https://via.placeholder.com/600x400?text=Немає+фото');

                card.innerHTML = `
                    <div class="car-image-wrapper" onclick="window.location.href='${detailUrl}'" style="cursor:pointer;" title="Натисни, щоб подивитися деталі">
                        <div class="condition-badge ${conditionClass}">${conditionText}</div>
                        <div class="class-badge">${carData.carClass.toUpperCase()}</div>
                        <img src="${mainImage}" alt="${carData.name}" onerror="this.src='https://via.placeholder.com/600x400?text=Немає+фото'">
                    </div>
                    <h3 onclick="window.location.href='${detailUrl}'" style="cursor:pointer;" title="Натисни, щоб подивитися деталі">${carData.name}</h3>
                    <div class="car-stats"><span>Багажник: ${carData.trunk} кг</span><span>Швидк: ${carData.speed} км/год</span></div>
                    <p class="price">$${Number(carData.price).toLocaleString()}</p>
                    <div class="action-buttons">
                        <button class="buy-btn" onclick="window.location.href='${detailUrl}'">Купити авто</button>
                        ${deleteBtnHtml}
                    </div>
                    <div class="owner-tag">Продавець: ${carData.ownerName}</div>
                `;
                grid.appendChild(card);
            }
            applyFilters(); 
        }

        function openAddCarModal() { document.getElementById('addCarModal').classList.add('active'); }
        function closeAddCarModal() { document.getElementById('addCarModal').classList.remove('active'); resetPhotoFields(); }

        function submitNewCar() {
            if (!checkCooldown()) return;
            
            const name = document.getElementById('newCarName').value.trim();
            const photoInputs = document.querySelectorAll('.car-photo-input');
            const images = [];
            photoInputs.forEach(input => { if (input.value.trim() !== '') images.push(input.value.trim()); });

            const price = parseInt(document.getElementById('newCarPrice').value);
            const speed = parseInt(document.getElementById('newCarSpeed').value);
            const trunk = parseInt(document.getElementById('newCarTrunk').value);
            const condition = document.getElementById('newCarCondition').value;
            const brand = document.getElementById('newCarBrand').value;
            const body = document.getElementById('newCarBody').value;
            const carClass = document.getElementById('newCarClass').value;

            if(!name || images.length === 0 || !price || !speed || !trunk) {
                showNotification('Заповни всі поля та додай хоча б 1 фото!', 'warning'); return;
            }

            // Ищем Discord ID
            let discordId = null;
            if (currentUser.providerData && currentUser.providerData.length > 0) {
                discordId = currentUser.providerData[0].uid;
            }
            
            if (!discordId) {
                showNotification('Помилка авторизації: неможливо отримати Discord ID!', 'error');
                return; 
            }

            const newCarId = 'car_' + Date.now();

            database.ref('cars/' + newCarId).set({
                name: name, images: images, price: price, speed: speed, trunk: trunk,
                condition: condition, brand: brand, body: body, carClass: carClass,
                ownerId: discordId, ownerName: currentUser.displayName, reserved: false
            }).then(() => {
                setCooldown(); closeAddCarModal();
                showNotification('Машина успішно виставлена на продаж!', 'success');
            }).catch(e => showNotification('Помилка: ' + e.message, 'error'));
        }

        function deleteCar(carId) {
            database.ref('cars/' + carId).remove()
                .then(() => showNotification('Оголошення успішно видалено!', 'success'))
                .catch(e => showNotification('Помилка видалення!', 'error'));
        }

        let currentTabCondition = 'all';
        function toggleFilters() { document.getElementById('filterPanel').classList.toggle('active'); }
        function filterConditionTab(condition, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active'); currentTabCondition = condition; applyFilters();
        }

        function applyFilters() {
            const brand = document.getElementById('filterBrand').value;
            const body = document.getElementById('filterBody').value;
            const carClass = document.getElementById('filterClass').value;
            const priceMin = parseInt(document.getElementById('filterPriceMin').value) || 0;
            const priceMax = parseInt(document.getElementById('filterPriceMax').value) || Infinity;

            document.querySelectorAll('.car-card').forEach(card => {
                let isMatch = true;
                if (currentTabCondition !== 'all' && card.getAttribute('data-condition') !== currentTabCondition) isMatch = false;
                if (brand !== 'all' && card.getAttribute('data-brand') !== brand) isMatch = false;
                if (body !== 'all' && card.getAttribute('data-body') !== body) isMatch = false;
                if (carClass !== 'all' && card.getAttribute('data-class') !== carClass) isMatch = false;
                const price = parseInt(card.getAttribute('data-price'));
                if (price < priceMin || price > priceMax) isMatch = false;

                card.classList.remove('fade-in');
                if (isMatch) { card.classList.remove('hidden'); setTimeout(() => card.classList.add('fade-in'), 10); } 
                else { card.classList.add('hidden'); }
            });
        }
        
        function resetFilters() {
            document.getElementById('filterBrand').value = 'all'; 
            document.getElementById('filterBody').value = 'all';
            document.getElementById('filterClass').value = 'all'; 
            document.getElementById('filterPriceMin').value = ''; 
            document.getElementById('filterPriceMax').value = '';
            applyFilters();
            showNotification('Фільтри скинуто', 'info');
        }

        let photoCount = 1;
        const MAX_PHOTOS = 10;

        function addPhotoField() {
            if (photoCount >= MAX_PHOTOS) return;
            const inputs = document.querySelectorAll('.car-photo-input');
            const lastInput = inputs[inputs.length - 1];
            
            if (lastInput.value.trim() === '') {
                showNotification('Спочатку встав посилання в попереднє поле для фото!', 'warning'); return;
            }

            const container = document.getElementById('photoInputsContainer');
            const input = document.createElement('input');
            input.type = 'text'; input.className = 'car-photo-input'; input.placeholder = `Додаткове фото ${photoCount + 1}`;
            container.appendChild(input);

            photoCount++;
            const btn = document.getElementById('addPhotoBtn');
            btn.innerText = `➕ ДОДАТИ ЩЕ ФОТО (${photoCount}/${MAX_PHOTOS})`;
            if (photoCount >= MAX_PHOTOS) btn.style.display = 'none';
        }

        function resetPhotoFields() {
            const container = document.getElementById('photoInputsContainer');
            container.innerHTML = '<input type="text" class="car-photo-input" placeholder="Головне фото (з\'явиться в каталозі)">';
            photoCount = 1;
            const btn = document.getElementById('addPhotoBtn');
            btn.innerText = `➕ ДОДАТИ ЩЕ ФОТО (1/${MAX_PHOTOS})`;
            btn.style.display = 'block';
            
            document.getElementById('newCarName').value = '';
            document.getElementById('newCarPrice').value = '';
            document.getElementById('newCarSpeed').value = '';
            document.getElementById('newCarTrunk').value = '';
        }
    </script>
</body>
</html>
