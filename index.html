<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АВТОБАЗАР У АШОТА</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>

:root{
--gold:#ffb703;
--green:#00f5d4;
--red:#ff2d55;
--bg:#0b0c10;
--glass:rgba(255,255,255,0.05);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:var(--bg);
color:white;
min-height:100vh;
padding:20px;
background-image:
radial-gradient(circle at top, rgba(255,183,3,.15), transparent 40%);
}

h1{
font-size:4rem;
font-weight:900;
text-align:center;
margin-bottom:10px;
background:linear-gradient(90deg,var(--gold),#ff5400);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
gap:10px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:12px 20px;
border-radius:12px;
cursor:pointer;
font-weight:700;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
}

.add-btn{
background:linear-gradient(45deg,var(--green),#00b4d8);
color:black;
}

.logout-btn{
background:transparent;
border:1px solid var(--red);
color:var(--red);
}

.logout-btn:hover{
background:var(--red);
color:white;
}

.login-screen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:90vh;
}

.discord-btn{
background:#5865F2;
color:white;
font-size:18px;
padding:15px 30px;
border-radius:15px;
}

.filters{
display:flex;
gap:10px;
margin-bottom:25px;
flex-wrap:wrap;
justify-content:center;
}

.filters input,
.filters select{
background:#111;
border:1px solid #333;
padding:12px;
border-radius:10px;
color:white;
}

.car-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:25px;
}

.car-card{
background:var(--glass);
border:1px solid rgba(255,255,255,0.08);
border-radius:20px;
overflow:hidden;
backdrop-filter:blur(10px);
transition:.3s;
}

.car-card:hover{
transform:translateY(-8px);
border-color:var(--gold);
}

.car-image{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:20px;
}

.car-name{
font-size:1.5rem;
font-weight:900;
margin-bottom:10px;
}

.stats{
display:flex;
justify-content:space-between;
font-size:14px;
color:#999;
margin-bottom:15px;
}

.price{
font-size:2rem;
font-weight:900;
color:var(--green);
margin-bottom:20px;
}

.actions{
display:flex;
gap:10px;
}

.buy-btn{
flex:1;
background:transparent;
border:2px solid var(--gold);
color:white;
}

.buy-btn:hover{
background:var(--gold);
color:black;
}

.delete-btn{
background:transparent;
border:2px solid var(--red);
color:var(--red);
}

.delete-btn:hover{
background:var(--red);
color:white;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modal.active{
display:flex;
}

.modal-content{
background:#111;
padding:30px;
border-radius:20px;
width:90%;
max-width:450px;
border:1px solid var(--gold);
}

.modal-content h2{
margin-bottom:20px;
}

.modal-content input,
.modal-content select{
width:100%;
margin-bottom:15px;
padding:12px;
background:#1a1a1a;
border:1px solid #333;
border-radius:10px;
color:white;
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#111;
padding:15px 20px;
border-left:5px solid var(--green);
border-radius:10px;
z-index:9999;
animation:slide .4s;
}

@keyframes slide{
from{
transform:translateX(100%);
}
to{
transform:translateX(0);
}
}

.hidden{
display:none;
}

</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
<h1>KURAHIVKA RP</h1>
<div class="subtitle">Авторизація через Discord</div>
<button class="btn discord-btn" onclick="login()">
УВІЙТИ ЧЕРЕЗ DISCORD
</button>
</div>

<div id="app" class="hidden">

<div class="topbar">

<button class="btn add-btn" onclick="openModal()">
➕ Продати авто
</button>

<div style="display:flex;align-items:center;gap:10px;">
<img id="avatar" width="40" height="40" style="border-radius:50%;">
<span id="username"></span>
<button class="btn logout-btn" onclick="logout()">Вийти</button>
</div>

</div>

<h1>АВТОБАЗАР У АШОТА</h1>
<div class="subtitle">Кращі тачки Kurahivka RP</div>

<div class="filters">

<input type="text" id="search" placeholder="Пошук..." oninput="renderCars()">

<select id="filterBrand" onchange="renderCars()">
<option value="all">Всі марки</option>
<option>BMW</option>
<option>Mercedes</option>
<option>Audi</option>
<option>Toyota</option>
<option>Porsche</option>
</select>

<select id="filterCondition" onchange="renderCars()">
<option value="all">Всі</option>
<option value="new">Нові</option>
<option value="used">Б/У</option>
</select>

</div>

<div class="car-grid" id="carGrid"></div>

</div>

<div class="modal" id="carModal">

<div class="modal-content">

<h2>Додати авто</h2>

<input type="text" id="carName" placeholder="Назва">

<input type="text" id="carImg" placeholder="Фото URL">

<input type="number" id="carPrice" placeholder="Ціна">

<input type="number" id="carSpeed" placeholder="Швидкість">

<input type="number" id="carTrunk" placeholder="Багажник">

<select id="carBrand">
<option>BMW</option>
<option>Mercedes</option>
<option>Audi</option>
<option>Toyota</option>
<option>Porsche</option>
</select>

<select id="carCondition">
<option value="new">Нова</option>
<option value="used">Б/У</option>
</select>

<button class="btn add-btn" style="width:100%;" onclick="addCar()">
Виставити
</button>

<br><br>

<button class="btn logout-btn" style="width:100%;" onclick="closeModal()">
Скасувати
</button>

</div>

</div>

<script>

const firebaseConfig = {

apiKey: "ТВОЙ_API",
authDomain: "ТВОЙ_AUTH_DOMAIN",
databaseURL: "ТВОЙ_DATABASE",
projectId: "ТВОЙ_PROJECT_ID",
storageBucket: "ТВОЙ_STORAGE",
messagingSenderId: "ТВОЙ_SENDER_ID",
appId: "ТВОЙ_APP_ID"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

const provider = new firebase.auth.OAuthProvider('oidc.discord');

provider.setCustomParameters({
prompt:'consent'
});

let currentUser = null;
let cars = {};

auth.onAuthStateChanged(user=>{

if(user){

currentUser = user;

document.getElementById('loginScreen').classList.add('hidden');
document.getElementById('app').classList.remove('hidden');

document.getElementById('username').innerText = user.displayName;
document.getElementById('avatar').src = user.photoURL;

}else{

document.getElementById('loginScreen').classList.remove('hidden');
document.getElementById('app').classList.add('hidden');

}

});

function login(){

auth.signInWithPopup(provider)
.then(()=>{
toast('Успішний вхід!');
})
.catch(e=>{
toast(e.message,true);
});

}

function logout(){
auth.signOut();
}

db.ref('cars').on('value',snap=>{

cars = snap.val() || {};
renderCars();

});

function renderCars(){

const grid = document.getElementById('carGrid');

grid.innerHTML = '';

const search = document.getElementById('search').value.toLowerCase();
const brand = document.getElementById('filterBrand').value;
const condition = document.getElementById('filterCondition').value;

Object.entries(cars).forEach(([id,car])=>{

if(search && !car.name.toLowerCase().includes(search)) return;
if(brand !== 'all' && car.brand !== brand) return;
if(condition !== 'all' && car.condition !== condition) return;

grid.innerHTML += `

<div class="car-card">

<img src="${car.image}" class="car-image">

<div class="card-body">

<div class="car-name">${car.name}</div>

<div class="stats">
<span>${car.speed} км/год</span>
<span>${car.trunk} кг</span>
</div>

<div class="price">$${Number(car.price).toLocaleString()}</div>

<div class="actions">

${
car.reserved
?
`<button class="btn buy-btn" disabled>ЗАБРОНЬОВАНО</button>`
:
`<button class="btn buy-btn" onclick="bookCar('${id}')">КУПИТИ</button>`
}

${
currentUser && currentUser.uid === car.ownerId
?
`<button class="btn delete-btn" onclick="deleteCar('${id}')">X</button>`
:
''
}

</div>

</div>

</div>

`;

});

}

function openModal(){

document.getElementById('carModal').classList.add('active');

}

function closeModal(){

document.getElementById('carModal').classList.remove('active');

}

function addCar(){

const car = {

name:document.getElementById('carName').value,
image:document.getElementById('carImg').value,
price:Number(document.getElementById('carPrice').value),
speed:Number(document.getElementById('carSpeed').value),
trunk:Number(document.getElementById('carTrunk').value),
brand:document.getElementById('carBrand').value,
condition:document.getElementById('carCondition').value,

ownerId:currentUser.uid,
ownerName:currentUser.displayName,

reserved:false

};

if(!car.name || !car.image || !car.price){

toast('Заповни всі поля',true);
return;

}

const id = 'car_' + Date.now();

db.ref('cars/' + id).set(car)
.then(()=>{

toast('Авто додано!');
closeModal();

})
.catch(e=>{

toast(e.message,true);

});

}

function deleteCar(id){

if(!confirm('Видалити авто?')) return;

db.ref('cars/' + id).remove();

}

function bookCar(id){

const nick = prompt('Введи ігровий нік');

if(!nick) return;

db.ref('cars/' + id).transaction(car=>{

if(car && !car.reserved){

car.reserved = true;
car.buyerNick = nick;
car.buyerId = currentUser.uid;

return car;

}

return;

})
.then(result=>{

if(result.committed){

toast('Авто заброньовано!');

}else{

toast('Авто вже зайняте',true);

}

});

}

function toast(text,error=false){

const div = document.createElement('div');

div.className = 'toast';

if(error){
div.style.borderColor = 'var(--red)';
}

div.innerText = text;

document.body.appendChild(div);

setTimeout(()=>{
div.remove();
},3000);

}

</script>

</body>
</html>
