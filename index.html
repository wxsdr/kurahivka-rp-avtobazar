<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АВТОБАЗАР У АШОТА | Kurahivka RP</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

<style>

:root{
    --gold:#ffb703;
    --green:#00f5d4;
    --red:#ff2d55;
    --discord:#5865F2;
    --bg:#0b0c10;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:var(--bg);
    color:white;
    font-family:'Montserrat',sans-serif;

    background-image:
    radial-gradient(circle at top, rgba(255,183,3,.15), transparent 40%);
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    flex-wrap:wrap;
    gap:15px;
}

.logo{
    font-size:3em;
    font-weight:900;
    background:linear-gradient(45deg,var(--gold),#ff6d00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:#999;
    margin-top:5px;
}

.auth-btn{
    background:var(--discord);
    border:none;
    color:white;
    padding:14px 24px;
    border-radius:14px;
    cursor:pointer;
    font-weight:700;
    transition:.3s;
}

.auth-btn:hover{
    transform:translateY(-2px);
}

.user-box{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,.05);
    padding:10px 15px;
    border-radius:15px;
}

.user-box img{
    width:40px;
    height:40px;
    border-radius:50%;
}

.add-btn{
    background:linear-gradient(45deg,var(--green),#00b4d8);
    color:black;
    border:none;
    padding:15px 25px;
    border-radius:15px;
    font-weight:900;
    cursor:pointer;
    transition:.3s;
}

.add-btn:hover{
    transform:translateY(-3px);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:30px;
}

.card{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:25px;
    overflow:hidden;
    cursor:pointer;
    transition:.4s;
    position:relative;
}

.card:hover{
    transform:translateY(-8px);
    border-color:var(--gold);
}

.card img{
    width:100%;
    height:230px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.car-name{
    font-size:1.5em;
    font-weight:900;
    margin-bottom:10px;
}

.stats{
    display:flex;
    justify-content:space-between;
    color:#aaa;
    margin-bottom:20px;
}

.price{
    color:var(--green);
    font-size:2em;
    font-weight:900;
    margin-bottom:20px;
}

.buttons{
    display:flex;
    gap:10px;
}

.buy-btn{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    background:transparent;
    border:2px solid var(--gold);
    color:white;
    font-weight:900;
    cursor:pointer;
    transition:.3s;
}

.buy-btn:hover{
    background:var(--gold);
    color:black;
}

.delete-btn{
    padding:14px;
    border:none;
    border-radius:12px;
    background:transparent;
    border:2px solid var(--red);
    color:var(--red);
    cursor:pointer;
    font-weight:900;
}

.badge{
    position:absolute;
    top:15px;
    left:15px;
    padding:8px 12px;
    border-radius:10px;
    font-size:12px;
    font-weight:900;
}

.new{
    background:rgba(0,245,212,.2);
    border:1px solid var(--green);
    color:var(--green);
}

.used{
    background:rgba(255,183,3,.2);
    border:1px solid var(--gold);
    color:var(--gold);
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    backdrop-filter:blur(10px);
    justify-content:center;
    align-items:center;
    z-index:100;
}

.modal.active{
    display:flex;
}

.modal-box{
    width:90%;
    max-width:500px;
    background:#111;
    border-radius:25px;
    padding:30px;
    border:1px solid rgba(255,255,255,.08);
}

.modal-box h2{
    margin-top:0;
}

.modal-box input,
.modal-box select{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,.05);
    color:white;
}

.modal-actions{
    display:flex;
    gap:10px;
}

.modal-actions button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:900;
}

.confirm{
    background:var(--gold);
    color:black;
}

.cancel{
    background:transparent;
    border:1px solid #555 !important;
    color:white;
}

@media(max-width:700px){

    .logo{
        font-size:2em;
    }

}

</style>
</head>

<body>

<div id="loginScreen">

<div class="topbar">

<div>
<div class="logo">АВТОБАЗАР У АШОТА</div>
<div class="subtitle">KURAHIVKA RP</div>
</div>

<button class="auth-btn" onclick="signInWithDiscord()">
Увійти через Discord
</button>

</div>

</div>

<div id="mainContent" style="display:none;">

<div class="topbar">

<button class="add-btn" onclick="openModal()">
➕ Продати авто
</button>

<div class="user-box">
<img id="userAvatar">
<div id="userName"></div>

<button class="auth-btn" onclick="signOut()">
Вийти
</button>
</div>

</div>

<div class="grid" id="carGrid"></div>

</div>

<div class="modal" id="addModal">

<div class="modal-box">

<h2>Додати авто</h2>

<input type="text" id="carName" placeholder="BMW M5 F90">

<input type="text" id="carImage" placeholder="Посилання на фото">

<input type="number" id="carPrice" placeholder="Ціна">

<input type="number" id="carSpeed" placeholder="Швидкість">

<input type="number" id="carTrunk" placeholder="Багажник">

<select id="carCondition">
<option value="new">З салону</option>
<option value="used">Б/У</option>
</select>

<select id="carBody">
<option value="sedan">Седан</option>
<option value="coupe">Купе</option>
<option value="suv">SUV</option>
</select>

<select id="carClass">
<option value="premium">Преміум</option>
<option value="business">Бізнес</option>
<option value="sport">Спорт</option>
<option value="economy">Економ</option>
</select>

<div class="modal-actions">

<button class="confirm" onclick="submitCar()">
Виставити
</button>

<button class="cancel" onclick="closeModal()">
Скасувати
</button>

</div>

</div>

</div>

<script>

const firebaseConfig = {

    apiKey: "ТВОЙ_API_KEY",
    authDomain: "ТВОЙ_AUTH_DOMAIN",
    databaseURL: "ТВОЙ_DATABASE_URL",
    projectId: "ТВОЙ_PROJECT_ID",
    storageBucket: "ТВОЙ_BUCKET",
    messagingSenderId: "ТВОЙ_SENDER_ID",
    appId: "ТВОЙ_APP_ID"

};

firebase.initializeApp(firebaseConfig);

const database = firebase.database();
const auth = firebase.auth();

const provider = new firebase.auth.OAuthProvider('oidc.discord');
provider.addScope('identify');

let currentUser = null;
let cars = {};

auth.onAuthStateChanged(user=>{

    if(user){

        currentUser = user;

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';

        document.getElementById('userAvatar').src =
        user.photoURL;

        document.getElementById('userName').innerText =
        user.displayName;

    }else{

        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';

    }

});

function signInWithDiscord(){

    auth.signInWithPopup(provider);

}

function signOut(){

    auth.signOut();

}

database.ref('cars').on('value', snapshot=>{

    cars = snapshot.val() || {};

    renderCars();

});

function renderCars(){

    const grid = document.getElementById('carGrid');

    grid.innerHTML = '';

    for(const carId in cars){

        const car = cars[carId];

        const card = document.createElement('div');

        card.className = 'card';

        card.onclick = (e)=>{

            if(
                e.target.classList.contains('buy-btn') ||
                e.target.classList.contains('delete-btn')
            ) return;

            window.location.href =
            `car.html?id=${carId}`;

        };

        card.innerHTML = `

        <div class="badge ${car.condition}">
        ${car.condition === 'new' ? 'З САЛОНУ' : 'Б/У'}
        </div>

        <img src="${car.image}">

        <div class="card-content">

        <div class="car-name">
        ${car.name}
        </div>

        <div class="stats">

        <div>${car.speed} км/год</div>

        <div>${car.trunk} кг</div>

        </div>

        <div class="price">
        $${Number(car.price).toLocaleString()}
        </div>

        <div class="buttons">

        <button class="buy-btn">
        Детальніше
        </button>

        ${
            currentUser &&
            currentUser.uid === car.ownerId

            ?

            `<button class="delete-btn"
            onclick="deleteCar('${carId}')">
            🗑
            </button>`

            :

            ''
        }

        </div>

        </div>

        `;

        grid.appendChild(card);

    }

}

function openModal(){

    if(!currentUser){

        alert('Увійди через Discord');
        return;

    }

    document.getElementById('addModal')
    .classList.add('active');

}

function closeModal(){

    document.getElementById('addModal')
    .classList.remove('active');

}

function submitCar(){

    const name =
    document.getElementById('carName').value;

    const image =
    document.getElementById('carImage').value;

    const price =
    document.getElementById('carPrice').value;

    const speed =
    document.getElementById('carSpeed').value;

    const trunk =
    document.getElementById('carTrunk').value;

    const condition =
    document.getElementById('carCondition').value;

    const body =
    document.getElementById('carBody').value;

    const carClass =
    document.getElementById('carClass').value;

    if(
        !name ||
        !image ||
        !price ||
        !speed ||
        !trunk
    ){

        alert('Заповни всі поля');
        return;

    }

    const carId = 'car_' + Date.now();

    database.ref('cars/' + carId).set({

        name:name,
        image:image,
        price:price,
        speed:speed,
        trunk:trunk,
        condition:condition,
        body:body,
        carClass:carClass,

        ownerId: currentUser.uid,

        ownerName: currentUser.displayName,

        ownerDiscordId:
        currentUser.providerData[0].uid,

        ownerAvatar:
        currentUser.photoURL,

        reserved:false

    });

    closeModal();

}

function deleteCar(carId){

    event.stopPropagation();

    if(confirm('Видалити авто?')){

        database.ref('cars/' + carId).remove();

    }

}

</script>

</body>
</html>
