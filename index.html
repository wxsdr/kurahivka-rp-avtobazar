<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurahivka OLX Маркетплейс</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --olx-dark: #002f34; 
            --olx-light-bg: #f2f4f5; 
            --olx-border: #d8dfe0; 
            --olx-text: #002f34; 
            --olx-gray: #406367; 
            --olx-btn-hover: #00a098;
            --olx-accent: #23e5db;
            --olx-heart: #ff5a5f;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 1. ПОЧИНКА СКРОЛЛА И ПЛАВНОСТЬ */
        html {
            scroll-behavior: smooth;
        }
        body { 
            background-color: var(--olx-light-bg); 
            color: var(--olx-text); 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            overflow-y: auto; 
            overflow-x: hidden;
            animation: pageFadeIn 0.5s ease-out;
        }

        /* 6. ПЛАВНЫЕ АНИМАЦИИ */
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes modalScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 4. ЕДИНАЯ ШАПКА */
        .main-header {
            background-color: var(--olx-dark);
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .logo { 
            font-size: 26px; 
            font-weight: 900; 
            color: #fff; 
            cursor: pointer; 
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .logo span { color: var(--olx-accent); }
        .header-actions { display: flex; gap: 15px; align-items: center; }

        /* 5. КНОПКИ ПОД ДИЗАЙН (БЕЗ ЧЕРНЫХ ОБВОДОК) */
        button, .olx-btn {
            font-family: 'Roboto', sans-serif;
            border: none;
            outline: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            padding: 10px 20px;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
        }
        .btn-primary {
            background-color: white;
            color: var(--olx-dark);
        }
        .btn-primary:hover {
            background-color: var(--olx-accent);
            color: var(--olx-dark);
            transform: translateY(-2px);
        }
        .btn-secondary {
            background-color: transparent;
            color: white;
        }
        .btn-secondary:hover {
            color: var(--olx-accent);
            background-color: rgba(255,255,255,0.05);
        }
        .btn-action {
            background-color: var(--olx-dark);
            color: white;
        }
        .btn-action:hover {
            background-color: var(--olx-btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 160, 152, 0.2);
        }

        /* Элементы контента */
        .main-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .search-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
        }
        .olx-input {
            flex: 1;
            border: 2px solid var(--olx-light-bg);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 16px;
            color: var(--olx-text);
            outline: none;
            transition: var(--transition);
        }
        .olx-input:focus {
            border-color: var(--olx-dark);
        }
        .olx-select {
            border: 2px solid var(--olx-light-bg);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 16px;
            background: white;
            outline: none;
            transition: var(--transition);
            cursor: pointer;
        }
        .olx-select:focus {
            border-color: var(--olx-dark);
        }

        /* 3. ДИНАМИЧЕСКИЕ ФИЛЬТРЫ КАТЕГОРИЙ */
        .filters-wrapper {
            background: #e8f0f2;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            animation: modalScale 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .filter-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--olx-gray);
            text-transform: uppercase;
        }

        /* Сетка категорий */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 35px;
        }
        .category-card {
            background: white;
            padding: 20px 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: var(--transition);
            font-weight: 500;
        }
        .category-card:hover, .category-card.active {
            transform: translateY(-4px);
            background: var(--olx-dark);
            color: white;
            box-shadow: 0 6px 18px rgba(0,47,52,0.15);
        }
        .category-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        /* Сетка товаров */
        .items-section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 20px;
        }
        .item-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .item-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }
        .item-img-container {
            width: 100%;
            height: 180px;
            background: #e5e9eb;
            position: relative;
        }
        .item-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .item-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .item-title {
            font-size: 16px;
            font-weight: 500;
            margin: 0 0 10px 0;
            line-height: 1.3;
            height: 42px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .item-meta {
            font-size: 13px;
            color: var(--olx-gray);
            margin-bottom: 12px;
            margin-top: auto;
        }
        .item-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--olx-dark);
        }

        /* Уведомления в шапке */
        .msg-badge {
            background-color: var(--olx-heart);
            color: white;
            font-size: 11px;
            font-weight: 700;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: -4px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Модалка */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,47,52,0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 650px;
            width: 100%;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: modalScale 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--olx-border);
            padding-bottom: 10px;
        }
        .modal-title { font-size: 22px; font-weight: 700; }
        .close-btn {
            background: transparent;
            font-size: 24px;
            padding: 5px;
            color: var(--olx-gray);
        }
        .close-btn:hover { color: var(--olx-dark); }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group-full { grid-column: 1 / -1; }
        .form-label {
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
            font-size: 14px;
        }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--olx-light-bg); }
        ::-webkit-scrollbar-thumb { background: #b4c2c4; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--olx-gray); }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo">Kurahivka <span>OLX</span></a>
            <div class="header-actions">
                <button class="btn-secondary" onclick="window.location.href='chat.html'">
                    ✉️ Повідомлення <span id="globalUnreadBadge" class="msg-badge" style="display: none;">1</span>
                </button>
                <button class="btn-secondary" id="loginBtn">👤 Увійти</button>
                <button class="btn-primary" onclick="openCreationPage()">➕ Додати оголошення</button>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="search-section-wrapper">
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="Що шукаєте? Наприклад, BMW M5..." class="olx-input" oninput="performSearch()">
                <button class="btn-action" onclick="performSearch()">Пошук</button>
            </div>
            
            <div id="carsFilters" class="filters-wrapper">
                <div class="filter-group">
                    <span class="filter-label">Марка</span>
                    <input type="text" id="fCarBrand" placeholder="Всі марки" class="olx-input" style="padding: 8px 12px; font-size:14px;" oninput="performSearch()">
                </div>
                <div class="filter-group">
                    <span class="filter-label">Макс. Швидкість (від)</span>
                    <input type="number" id="fCarSpeed" placeholder="Км/г" class="olx-input" style="padding: 8px 12px; font-size:14px; width: 100px;" oninput="performSearch()">
                </div>
                <div class="filter-group">
                    <span class="filter-label">Багажник (від)</span>
                    <input type="number" id="fCarTrunk" placeholder="Кг" class="olx-input" style="padding: 8px 12px; font-size:14px; width: 100px;" oninput="performSearch()">
                </div>
                <button class="btn-action" style="padding: 8px 15px; font-size:14px; margin-top:18px;" onclick="resetFilters()">Скинути</button>
            </div>
        </div>

        <div class="categories-grid">
            <div class="category-card active" id="cat_all" onclick="selectCategory('all')">
                <div class="category-icon">✨</div>
                <div>Всі товари</div>
            </div>
            <div class="category-card" id="cat_cars" onclick="selectCategory('cars')">
                <div class="category-icon">🚗</div>
                <div>Транспорт</div>
            </div>
            <div class="category-card" id="cat_realty" onclick="selectCategory('realty')">
                <div class="category-icon">🏠</div>
                <div>Нерухомість</div>
            </div>
            <div class="category-card" id="cat_other" onclick="selectCategory('other')">
                <div class="category-icon">📦</div>
                <div>Інше</div>
            </div>
        </div>

        <div class="items-section-title" id="sectionTitle">Преміум оголошення</div>
        <div class="items-grid" id="itemsGrid"></div>
    </div>

    <div id="creationModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Створення оголошення</div>
                <button class="close-btn" onclick="closeCreationPage()">&times;</button>
            </div>
            <div class="form-grid">
                <div class="form-group-full">
                    <label class="form-label">Назва оголошення *</label>
                    <input type="text" id="cTitle" placeholder="Введіть коротку назву" class="olx-input">
                </div>
                <div>
                    <label class="form-label">Категорія</label>
                    <select id="cCategory" class="olx-select" style="width:100%;" onchange="toggleModalFields()">
                        <option value="other">Інше</option>
                        <option value="cars">Транспорт</option>
                        <option value="realty">Нерухомість</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Ціна ($) *</label>
                    <input type="number" id="cPrice" placeholder="Ціна" class="olx-input">
                </div>

                <div id="modalCarFields" class="form-group-full form-grid" style="display:none; margin:0; padding:0;">
                    <div>
                        <label class="form-label">Марка авто</label>
                        <input type="text" id="cCarBrand" placeholder="Напр. Mercedes" class="olx-input">
                    </div>
                    <div>
                        <label class="form-label">Макс. швидкість (км/год)</label>
                        <input type="number" id="cCarSpeed" placeholder="240" class="olx-input">
                    </div>
                    <div class="form-group-full">
                        <label class="form-label">Місткість багажника (кг)</label>
                        <input type="number" id="cCarTrunk" placeholder="50" class="olx-input">
                    </div>
                </div>

                <div id="modalRealtyFields" class="form-group-full form-grid" style="display:none; margin:0; padding:0;">
                    <div>
                        <label class="form-label">Кількість кімнат</label>
                        <input type="number" id="cRealRooms" placeholder="2" class="olx-input">
                    </div>
                    <div>
                        <label class="form-label">Площа (м²)</label>
                        <input type="number" id="cRealArea" placeholder="60" class="olx-input">
                    </div>
                </div>

                <div>
                    <label class="form-label">Стан</label>
                    <select id="cCondition" class="olx-select" style="width:100%;">
                        <option value="Нове">Нове</option>
                        <option value="Вживане">Вживане</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Тип продавця</label>
                    <select id="cSellerType" class="olx-select" style="width:100%;">
                        <option value="Приватна особа">Приватна особа</option>
                        <option value="Бізнес">Бізнес</option>
                    </select>
                </div>
                <div class="form-group-full">
                    <label class="form-label">Номер телефону *</label>
                    <input type="text" id="cPhone" placeholder="+380..." class="olx-input">
                </div>
                <div class="form-group-full">
                    <label class="form-label">Опис товару</label>
                    <textarea id="cDescription" placeholder="Опишіть ваш товар детально..." class="olx-input" style="height:100px; resize:none;"></textarea>
                </div>
                <div class="form-group-full">
                    <label class="form-label">Фотографії товару</label>
                    <input type="file" id="cFiles" multiple accept="image/*">
                </div>
            </div>
            <div style="display:flex; justify-content: flex-end; gap: 10px; margin-top:20px;">
                <button class="btn-secondary" style="color:var(--olx-dark);" onclick="closeCreationPage()">Скасувати</button>
                <button class="btn-action" id="publishBtn" onclick="publishAd()">Опублікувати оголошення</button>
            </div>
        </div>
    </div>

    <script>
        // ЗАМЕНИ НА СВОЙ КОНФИГ FIREBASE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentUser = null;
        let myId = null;
        let selectedCategory = 'all';
        let allItems = {};

        auth.onAuthStateChanged(user => {
            const loginBtn = document.getElementById('loginBtn');
            if(user) {
                currentUser = user; myId = user.uid;
                loginBtn.innerText = `👤 ${user.displayName || 'Профіль'}`;
                listenToUnreadMessages();
            } else {
                currentUser = null; myId = null;
                loginBtn.innerText = "👤 Увійти";
                loginBtn.onclick = () => {
                    const provider = new firebase.auth.OAuthProvider('discord');
                    auth.signInWithPopup(provider).catch(() => alert('Помилка авторизації!'));
                };
            }
        });

        function listenToUnreadMessages() {
            if(!myId) return;
            db.ref('chats').on('value', snap => {
                let totalUnread = 0;
                snap.forEach(child => {
                    const chat = child.val();
                    if((chat.buyerId === myId || chat.sellerId === myId) && chat.lastSenderId !== myId) {
                        if(chat.unreadCount && chat.unreadCount > 0) totalUnread += chat.unreadCount;
                        else if(chat.unread === true || chat[`unread_${myId}`] === true) totalUnread += 1;
                    }
                });
                const badge = document.getElementById('globalUnreadBadge');
                if(totalUnread > 0) { badge.innerText = totalUnread; badge.style.display = 'inline-flex'; }
                else { badge.style.display = 'none'; }
            });
        }

        db.ref('items').on('value', snap => {
            allItems = snap.val() || {};
            performSearch();
        });

        function selectCategory(cat) {
            selectedCategory = cat;
            document.querySelectorAll('.category-card').forEach(el => el.classList.remove('active'));
            document.getElementById(`cat_${cat}`).classList.add('active');
            
            // Показ фильтров для машин
            const carsFiltersBlock = document.getElementById('carsFilters');
            carsFiltersBlock.style.display = (cat === 'cars') ? 'flex' : 'none';
            if(cat !== 'cars') resetFilters(false);
            performSearch();
        }

        function resetFilters(shouldRefresh = true) {
            document.getElementById('fCarBrand').value = '';
            document.getElementById('fCarSpeed').value = '';
            document.getElementById('fCarTrunk').value = '';
            if(shouldRefresh) performSearch();
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';

            const carBrand = document.getElementById('fCarBrand').value.toLowerCase().trim();
            const carSpeed = parseInt(document.getElementById('fCarSpeed').value) || 0;
            const carTrunk = parseInt(document.getElementById('fCarTrunk').value) || 0;
            let count = 0;

            for(let key in allItems) {
                const item = allItems[key];
                if(selectedCategory !== 'all' && item.category !== selectedCategory) continue;
                if(query && !item.name.toLowerCase().includes(query) && !item.description.toLowerCase().includes(query)) continue;

                if(selectedCategory === 'cars') {
                    if(carBrand && (!item.brand || !item.brand.toLowerCase().includes(carBrand))) continue;
                    if(carSpeed && (!item.speed || parseInt(item.speed) < carSpeed)) continue;
                    if(carTrunk && (!item.trunk || parseInt(item.trunk) < carTrunk)) continue;
                }

                count++;
                const imgUrl = (item.images && item.images.length > 0) ? item.images[0] : 'https://via.placeholder.com/300x180?text=No+Image';
                grid.innerHTML += `
                    <div class="item-card" onclick="window.location.href='car.html?id=${key}'">
                        <div class="item-img-container"><img src="${imgUrl}" class="item-img" alt="${item.name}"></div>
                        <div class="item-info">
                            <h3 class="item-title">${item.name}</h3>
                            <div class="item-meta">${item.condition || 'Вживане'} • ${item.sellerType || 'Приватна'}</div>
                            <div class="item-price">${parseFloat(item.price).toLocaleString()} $</div>
                        </div>
                    </div>
                `;
            }
            if(count === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--olx-gray); padding: 40px; font-weight:500;">Нічого не знайдено за вашим запитом.</div>`;
            }
        }

        function openCreationPage() {
            if(!currentUser) { alert('Будь ласка, увійдіть для публікації оголошень!'); return; }
            document.getElementById('creationModal').style.display = 'flex';
        }
        function closeCreationPage() { document.getElementById('creationModal').style.display = 'none'; }
        
        function toggleModalFields() {
            const cat = document.getElementById('cCategory').value;
            document.getElementById('modalCarFields').style.display = (cat === 'cars') ? 'grid' : 'none';
            document.getElementById('modalRealtyFields').style.display = (cat === 'realty') ? 'grid' : 'none';
        }

        async function uploadToImgBB(file) {
            const formData = new FormData(); formData.append('image', file);
            const apiKey = 'YOUR_IMGBB_API_KEY_HERE'; 
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, { method: 'POST', body: formData });
            const data = await res.json();
            if(data.success) return data.data.url;
            throw new Error('Upload failed');
        }

        async function publishAd() {
            const name = document.getElementById('cTitle').value.trim();
            const description = document.getElementById('cDescription').value.trim();
            const price = parseFloat(document.getElementById('cPrice').value) || 0;
            const category = document.getElementById('cCategory').value;
            const condition = document.getElementById('cCondition').value;
            const sellerType = document.getElementById('cSellerType').value;
            const phone = document.getElementById('cPhone').value.trim();
            const files = document.getElementById('cFiles').files;

            if(!name || !price || !phone) { alert('Заповніть обов\'язкові поля (*)!'); return; }

            const btn = document.getElementById('publishBtn');
            btn.disabled = true; btn.innerText = 'Завантаження фото на OLX...';

            try {
                const uploadedUrls = [];
                for(let f of files) { 
                    try { const url = await uploadToImgBB(f); uploadedUrls.push(url); } catch(e) {}
                }

                const itemId = 'item_' + Date.now();
                const payload = {
                    name, description, price, category, condition, sellerType, phone,
                    images: uploadedUrls, ownerId: myId, ownerName: currentUser.displayName, createdAt: Date.now()
                };

                if(category === 'cars') {
                    payload.brand = document.getElementById('cCarBrand').value || 'Не вказано';
                    payload.speed = document.getElementById('cCarSpeed').value || 120;
                    payload.trunk = document.getElementById('cCarTrunk').value || 40;
                } else if(category === 'realty') {
                    payload.rooms = document.getElementById('cRealRooms').value || 1;
                    payload.area = document.getElementById('cRealArea').value || 30;
                }

                await db.ref('items/' + itemId).set(payload);
                alert('Оголошення успішно додано!');
                closeCreationPage();
            } catch(e) { alert('Сталася помилка при створенні.'); }
            btn.disabled = false; btn.innerText = 'Опублікувати оголошення';
        }
    </script>
</body>
</html>
