<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Повідомлення | Kurahivka</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        :root { --olx-dark: #002f34; --olx-light-bg: #f2f4f5; --olx-border: #d8dfe0; --olx-text: #002f34; --olx-gray: #406367; }
        body { background: var(--olx-light-bg); color: var(--olx-text); font-family: 'Roboto', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        * { box-sizing: border-box; }
        
        header { background: var(--olx-dark); padding: 15px; color: white; display: flex; align-items: center; justify-content: space-between; }
        .back-link { color: #23e5db; font-weight: bold; cursor: pointer; text-decoration: none; }

        .chat-layout { display: flex; flex: 1; overflow: hidden; max-width: 1200px; width: 100%; margin: 0 auto; background: white; border: 1px solid var(--olx-border); }
        
        /* Ліва частина - список діалогів */
        .sidebar { width: 350px; border-right: 1px solid var(--olx-border); display: flex; flex-direction: column; background: #fff; }
        .chat-roles-tabs { display: flex; background: #f2f4f5; border-bottom: 1px solid var(--olx-border); }
        .role-tab { flex: 1; text-align: center; padding: 15px; font-weight: bold; cursor: pointer; color: var(--olx-gray); border-bottom: 3px solid transparent; }
        .role-tab.active { color: var(--olx-dark); border-bottom-color: var(--olx-dark); background: white; }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 15px; border-bottom: 1px solid var(--olx-border); cursor: pointer; align-items: center; gap: 12px; }
        .chat-item:hover, .chat-item.active { background: #f2f4f5; }
        .chat-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .chat-item-info { flex: 1; overflow: hidden; }
        .chat-item-name { font-weight: bold; font-size: 14px; margin-bottom: 3px; }
        .chat-item-title { font-size: 12px; color: var(--olx-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread-dot { width: 10px; height: 10px; background: #ff5a5f; border-radius: 50%; }

        /* Права частина - Вікно листування */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #f8fafb; }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--olx-border); background: white; font-weight: bold; display: flex; align-items: center; justify-content: space-between; }
        .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .msg-bubble { max-width: 60%; padding: 12px 16px; border-radius: 8px; font-size: 15px; position: relative; line-height: 1.4; }
        .msg-mine { background: #c6f7f4; align-self: flex-end; border-bottom-right-radius: 0; color: var(--olx-text); }
        .msg-other { background: white; align-self: flex-start; border-bottom-left-radius: 0; border: 1px solid var(--olx-border); }
        .msg-time { font-size: 10px; color: var(--olx-gray); margin-top: 4px; text-align: right; }

        .input-panel { padding: 15px; background: white; border-top: 1px solid var(--olx-border); display: flex; gap: 10px; }
        .input-panel input { flex: 1; padding: 14px; border: 1px solid var(--olx-border); border-radius: 4px; outline: none; font-size: 15px; }
        .send-btn { background: var(--olx-dark); color: white; border: none; padding: 0 25px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        .no-chat-selected { flex: 1; display: flex; justify-content: center; align-items: center; color: var(--olx-gray); font-size: 16px; font-weight: 500; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 20px; font-weight: 900;">Мої повідомлення Kurahivka</div>
        <div class="back-link" onclick="window.location.href='index.html'"> повернутися на OLX</div>
    </header>

    <div class="chat-layout">
        <div class="sidebar">
            <div class="chat-roles-tabs">
                <div class="role-tab active" id="tabRoleBuy" onclick="changeChatRole('buyer')">Купую</div>
                <div class="role-tab" id="tabRoleSell" onclick="changeChatRole('seller')">Продаю</div>
            </div>
            <div class="chat-list" id="chatsContainer"></div>
        </div>

        <div class="main-chat" id="chatWindow">
            <div class="no-chat-selected">Оберіть чат зі списку зліва, щоб почати діалог</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCbNGyrjT1rf-2UHeRj2LCCdqIrsaZ0TG0",
            authDomain: "kurahivka-rp-avtobazar.firebaseapp.com",
            databaseURL: "https://kurahivka-rp-avtobazar-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kurahivka-rp-avtobazar",
            storageBucket: "kurahivka-rp-avtobazar.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let myId = null, myName = null, currentRole = 'buyer', activeChatId = null, activeChatInfo = null;
        let allChats = {};

        auth.onAuthStateChanged(user => {
            if(user) {
                myId = user.providerData?.[0]?.uid || user.uid;
                myName = user.displayName;
                loadChatsList();
            } else {
                window.location.href = 'index.html';
            }
        });

        function changeChatRole(role) {
            currentRole = role;
            document.getElementById('tabRoleBuy').classList.toggle('active', role === 'buyer');
            document.getElementById('tabRoleSell').classList.toggle('active', role === 'seller');
            renderChatsList();
        }

        function loadChatsList() {
            db.ref('chats').on('value', snap => {
                allChats = snap.val() || {};
                renderChatsList();
                if(activeChatId) { openChatMessages(activeChatId); }
            });
        }

        function renderChatsList() {
            const container = document.getElementById('chatsContainer');
            container.innerHTML = '';

            const filtered = Object.keys(allChats).filter(id => {
                const c = allChats[id];
                if(currentRole === 'buyer' && c.buyerId === myId) return true;
                if(currentRole === 'seller' && c.sellerId === myId) return true;
                return false;
            });

            if(filtered.length === 0) {
                container.innerHTML = `<div style="padding:20px; text-align:center; color:var(--olx-gray);">Немає діалогів у цій вкладці</div>`;
                return;
            }

            filtered.forEach(id => {
                const c = allChats[id];
                // Визначаємо з ким ведеться діалог
                const partnerName = currentRole === 'buyer' ? c.sellerName : c.buyerName;
                const partnerAvatar = currentRole === 'buyer' ? (c.sellerAvatar || 'https://via.placeholder.com/45') : (c.buyerAvatar || 'https://via.placeholder.com/45');
                const hasUnread = c.lastSenderId && c.lastSenderId !== myId;

                const item = document.createElement('div');
                item.className = `chat-item ${activeChatId === id ? 'active' : ''}`;
                item.onclick = () => selectChat(id);
                item.innerHTML = `
                    <img src="${partnerAvatar}">
                    <div class="chat-item-info">
                        <div class="chat-item-name">${partnerName}</div>
                        <div class="chat-item-title">${c.carTitle || 'Товар'}</div>
                        <div style="font-size:11px; color:#a0a0a0; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.lastMessageText || 'Повідомлень немає'}</div>
                    </div>
                    ${hasUnread ? `<div class="unread-dot"></div>` : ''}
                `;
                container.appendChild(item);
            });
        }

        function selectChat(id) {
            activeChatId = id;
            activeChatInfo = allChats[id];
            renderChatsList();
            buildChatWindowStructure();
            openChatMessages(id);
        }

        function buildChatWindowStructure() {
            const partnerName = currentRole === 'buyer' ? activeChatInfo.sellerName : activeChatInfo.buyerName;
            const win = document.getElementById('chatWindow');
            win.innerHTML = `
                <div class="chat-header">
                    <div>
                        <span>Чат з <b>${partnerName}</b></span>
                        <div style="font-size:12px; color:var(--olx-gray); font-weight:normal; margin-top:2px;">Тема: ${activeChatInfo.carTitle}</div>
                    </div>
                </div>
                <div class="messages-area" id="messagesArea"></div>
                <div class="input-panel">
                    <input type="text" id="msgInput" placeholder="Напишіть ваше повідомлення..." onkeydown="if(event.key==='Enter') sendMsg()">
                    <button class="send-btn" onclick="sendMsg()">Надіслати</button>
                </div>
            `;
        }

        function openChatMessages(id) {
            db.ref(`chats/${id}/messages`).off();
            db.ref(`chats/${id}/messages`).on('value', snap => {
                const area = document.getElementById('messagesArea');
                if(!area) return;
                area.innerHTML = '';
                
                snap.forEach(child => {
                    const m = child.val();
                    const isMine = m.senderId === myId;
                    const timeStr = new Date(m.timestamp).toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'});
                    
                    area.innerHTML += `
                        <div class="msg-bubble ${isMine ? 'msg-mine' : 'msg-other'}">
                            <div>${m.text}</div>
                            <div class="msg-time">${timeStr}</div>
                        </div>
                    `;
                });
                setTimeout(() => area.scrollTop = area.scrollHeight, 40);
            });
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return; input.value = '';
            const ts = Date.now();

            await db.ref(`chats/${activeChatId}/messages`).push({ senderId: myId, text: text, timestamp: ts });
            await db.ref(`chats/${activeChatId}`).update({ lastUpdated: ts, lastSenderId: myId, lastSenderName: myName, lastMessageText: text });
        }
    </script>
</body>
</html>
