<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деталі авто | Kurahivka RP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --neon-gold: #ffb703; --neon-red: #d90429; --neon-green: #00f5d4; --discord-color: #5865F2; 
            --dark-bg: #0b0c10; --glass-bg: rgba(31, 33, 40, 0.6); --glass-border: rgba(255, 255, 255, 0.08);
        }
        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 183, 3, 0.15) 0%, transparent 50%);
            color: #ffffff; font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; padding-top: 40px; }
        .back-btn {
            background: transparent; color: var(--neon-gold); border: 1px solid var(--neon-gold);
            padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold;
            text-decoration: none; display: inline-block; margin-bottom: 20px; transition: 0.3s;
        }
        .back-btn:hover { background: var(--neon-gold); color: black; }
        
        .car-details {
            background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
        }
        
        /* ГАЛЕРЕЯ ФОТОГРАФІЙ */
        .car-img { display: flex; flex-direction: column; gap: 15px; }
        .main-photo-container { 
            width: 100%; height: 350px; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #111;
        }
        .main-photo-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s ease; }
        
        .thumbnails { 
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; 
        }
        .thumbnails img { 
            width: 80px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; 
            border: 2px solid transparent; transition: 0.3s; opacity: 0.6;
        }
        .thumbnails img:hover { opacity: 1; }
        .thumbnails img.active { border-color: var(--neon-gold); opacity: 1; transform: scale(1.05); }
        
        /* Стиль скроллбару для мініатюр */
        .thumbnails::-webkit-scrollbar { height: 6px; }
        .thumbnails::-webkit-scrollbar-thumb { background: var(--neon-gold); border-radius: 10px; }
        .thumbnails::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }

        .car-info h1 { margin-top: 0; font-size: 2.5em; color: var(--neon-gold); text-transform: uppercase; }
        .price { font-size: 2em; color: var(--neon-green); font-weight: 900; margin: 20px 0; }
        .specs { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        .specs p { margin: 10px 0; font-size: 1.1em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .specs span { color: var(--neon-gold); font-weight: bold; }
        
        .contact-btn {
            background: var(--discord-color); color: white; border: none; padding: 15px 30px;
            border-radius: 15px; font-size: 1.2em; font-weight: 900; cursor: pointer;
            width: 100%; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .contact-btn:hover { background: #4752c4; box-shadow: 0 0 20px rgba(88, 101, 242, 0.5); transform: translateY(-3px); }
        .loading { text-align: center; font-size: 2em; margin-top: 100px; color: var(--neon-gold); }

        @media (max-width: 768px) {
            .car-details { grid-template-columns: 1fr; }
            .main-photo-container { height: 250px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">⬅ НАЗАД В КАТАЛОГ</a>
        <div id="content" class="loading">Завантаження інформації про авто...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCbNGyrjT1rf-2UHeRj2LCCdqIrsaZ0TG0",
            authDomain: "kurahivka-rp-avtobazar.firebaseapp.com",
            databaseURL: "https://kurahivka-rp-avtobazar-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kurahivka-rp-avtobazar",
            storageBucket: "kurahivka-rp-avtobazar.firebasestorage.app",
            messagingSenderId: "405277187723",
            appId: "1:405277187723:web:c29a83d4a2ae3630643e8e"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        const urlParams = new URLSearchParams(window.location.search);
        const carId = urlParams.get('id');
        let currentCarData = null;
        let currentUser = null;

        auth.onAuthStateChanged(user => { currentUser = user; });

        if (!carId) {
            document.getElementById('content').innerHTML = "Помилка: Авто не знайдено!";
        } else {
            database.ref('cars/' + carId).once('value').then((snapshot) => {
                currentCarData = snapshot.val();
                if (currentCarData) {
                    renderPage(currentCarData);
                } else {
                    document.getElementById('content').innerHTML = "Оголошення було видалено або не існує.";
                }
            });
        }

        // Функція зміни головного фото
        window.changeMainImage = function(thumbElement, srcUrl) {
            document.getElementById('mainDetailImage').src = srcUrl;
            document.querySelectorAll('.thumbnails img').forEach(img => img.classList.remove('active'));
            thumbElement.classList.add('active');
        }

        function renderPage(car) {
            const content = document.getElementById('content');
            content.classList.remove('loading');
            
            const conditionText = car.condition === 'new' ? 'З салону' : 'Вживана (Б/У)';
            
            // Отримуємо масив картинок або перестраховуємось (якщо авто додано старим кодом)
            const images = (car.images && car.images.length > 0) ? car.images : [car.image || 'https://via.placeholder.com/800x600?text=Немає+фото'];
            const mainImageUrl = images[0];

            // Формуємо HTML для мініатюр (тільки якщо їх більше однієї)
            let thumbnailsHtml = '';
            if (images.length > 1) {
                thumbnailsHtml = '<div class="thumbnails">';
                images.forEach((imgUrl, index) => {
                    const activeClass = index === 0 ? 'active' : '';
                    thumbnailsHtml += `<img src="${imgUrl}" class="${activeClass}" onclick="changeMainImage(this, '${imgUrl}')" onerror="this.src='https://via.placeholder.com/150x100?text=Помилка'">`;
                });
                thumbnailsHtml += '</div>';
            }
            
            content.innerHTML = `
                <div class="car-details">
                    <div class="car-img">
                        <div class="main-photo-container">
                            <img id="mainDetailImage" src="${mainImageUrl}" alt="${car.name}" onerror="this.src='https://via.placeholder.com/800x600?text=Немає+фото'">
                        </div>
                        ${thumbnailsHtml}
                    </div>
                    <div class="car-info">
                        <h1>${car.name}</h1>
                        <div class="price">$${Number(car.price).toLocaleString()}</div>
                        
                        <div class="specs">
                            <p>Стан: <span>${conditionText}</span></p>
                            <p>Клас: <span>${car.carClass.toUpperCase()}</span></p>
                            <p>Тип кузова: <span>${car.body}</span></p>
                            <p>Макс. швидкість: <span>${car.speed} км/год</span></p>
                            <p>Багажник: <span>${car.trunk} кг</span></p>
                            <p>Продавець: <span>${car.ownerName}</span></p>
                        </div>

                        <button class="contact-btn" onclick="contactSeller('${car.ownerId}', '${car.name}')">
                            💬 Написати продавцю
                        </button>
                    </div>
                </div>
            `;
        }

async function contactSeller(sellerDiscordId, carName) {
            if (!currentUser) {
                alert("Спочатку авторизуйся на головній сторінці!");
                window.location.href = 'index.html';
                return;
            }

            if (currentUser.uid === sellerDiscordId) {
                alert("Ти не можеш написати сам собі!");
                return;
            }

            const btn = document.querySelector('.contact-btn');
            btn.innerText = "Відправка...";
            btn.disabled = true;

            const botApiUrl = "https://kurahivka-rp-avtobazar-bot.onrender.com/api/contact"; 
            
            try {
                const response = await fetch(botApiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        seller_id: String(sellerDiscordId), // Принудительно делаем строкой
                        car_name: carName
                    })
                });

                // Читаем ответ от сервера (даже если это ошибка 400)
                const responseData = await response.json();

                if (response.ok) {
                    alert("✅ Продавець отримав твоє повідомлення в Discord!");
                    btn.innerText = "Повідомлення відправлено!";
                    btn.style.background = "var(--neon-green)";
                    btn.style.color = "black";
                } else {
                    // Если сервер вернул 400 или 404, показываем точную причину прямо на экране
                    alert(`❌ Помилка: ${responseData.message}`);
                    btn.innerText = "💬 Написати продавцю";
                    btn.disabled = false;
                }
            } catch (e) {
                alert("❌ Помилка з'єднання з ботом! Бот вимкнений або помилка мережі.");
                console.error(e);
                btn.innerText = "💬 Написати продавцю";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
