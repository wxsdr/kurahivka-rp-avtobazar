<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перегляд оголошення | Kurahivka OLX</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --olx-dark: #002f34; 
            --olx-light-bg: #f2f4f5; 
            --olx-border: #d8dfe0; 
            --olx-text: #002f34; 
            --olx-gray: #406367; 
            --olx-btn-hover: #00a098;
            --olx-accent: #23e5db;
            --olx-heart: #ff5a5f;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 1. ПОЧИНКА СКРОЛЛА И ПЛАВНОСТЬ */
        html {
            scroll-behavior: smooth;
        }
        body { 
            background-color: var(--olx-light-bg); 
            color: var(--olx-text); 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            overflow-y: auto; 
            overflow-x: hidden;
            animation: pageFadeIn 0.5s ease-out;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 4. ЕДИНАЯ ШАПКА */
        .main-header {
            background-color: var(--olx-dark);
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .logo { 
            font-size: 26px; 
            font-weight: 900; 
            color: #fff; 
            cursor: pointer; 
            text-decoration: none;
        }
        .logo span { color: var(--olx-accent); }
        .header-actions { display: flex; gap: 15px; align-items: center; }

        /* 5. КНОПКИ ПОД ДИЗАЙН (БЕЗ ЧЕРНЫХ ОБВОДОК) */
        button {
            font-family: 'Roboto', sans-serif;
            border: none;
            outline: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            padding: 12px 24px;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
        }
        .btn-primary {
            background-color: white;
            color: var(--olx-dark);
        }
        .btn-primary:hover {
            background-color: var(--olx-accent);
            color: var(--olx-dark);
            transform: translateY(-2px);
        }
        .btn-secondary {
            background-color: transparent;
            color: white;
            padding: 10px 20px;
            font-size: 15px;
        }
        .btn-secondary:hover {
            color: var(--olx-accent);
            background-color: rgba(255,255,255,0.05);
        }
        .btn-action {
            background-color: var(--olx-dark);
            color: white;
            width: 100%;
        }
        .btn-action:hover {
            background-color: var(--olx-btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 160, 152, 0.2);
        }
        .btn-outline {
            background-color: white;
            border: 2px solid var(--olx-dark);
            color: var(--olx-dark);
            width: 100%;
        }
        .btn-outline:hover {
            background-color: var(--olx-light-bg);
            transform: translateY(-2px);
        }

        .main-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }

        .ad-main-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }
        .gallery-container {
            width: 100%;
            height: 400px;
            background: #e5e9eb;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }
        .gallery-img { width: 100%; height: 100%; object-fit: contain; }
        .ad-price { font-size: 28px; font-weight: 900; color: var(--olx-dark); margin-bottom: 10px; }
        .ad-title { font-size: 24px; font-weight: 700; margin: 0 0 15px 0; color: var(--olx-dark); }
        .ad-meta { color: var(--olx-gray); font-size: 14px; border-bottom: 1px solid var(--olx-border); padding-bottom: 15px; margin-bottom: 20px; }

        .params-box { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 25px; }
        .param-badge { background: var(--olx-light-bg); padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; color: var(--olx-dark); }
        .param-badge span { color: var(--olx-gray); font-weight: 400; }

        .ad-description { font-size: 16px; line-height: 1.6; color: var(--olx-text); white-space: pre-line; }

        /* Боковое меню автора */
        .sidebar-panel { background: white; border-radius: 12px; padding: 25px; box-shadow: var(--shadow); height: fit-content; display: flex; flex-direction: column; gap: 15px; }
        .author-info { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--olx-border); padding-bottom: 15px; }
        .author-avatar { width: 50px; height: 50px; border-radius: 50%; background: #b4c2c4; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 20px; }
        .author-name { font-size: 18px; font-weight: 700; }

        /* Похожие объявления */
        .similar-section { grid-column: 1 / -1; margin-top: 20px; }
        .similar-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 20px; }
        .item-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: var(--transition); }
        .item-card:hover { transform: translateY(-6px); box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1); }
        .item-img-container { width: 100%; height: 170px; background: #e5e9eb; }
        .item-img { width: 100%; height: 100%; object-fit: cover; }
        .item-info { padding: 15px; }
        .item-card-title { font-size: 15px; font-weight: 500; margin: 0 0 10px 0; height: 40px; overflow: hidden; }
        .item-card-price { font-size: 16px; font-weight: 700; color: var(--olx-dark); }

        .msg-badge { background-color: var(--olx-heart); color: white; font-size: 11px; font-weight: 700; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; margin-left: -4px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--olx-light-bg); }
        ::-webkit-scrollbar-thumb { background: #b4c2c4; border-radius: 4px; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo" style="color: white; text-decoration: none; font-weight: 900; font-size: 26px;">Kurahivka <span>OLX</span></a>
            <div class="header-actions">
                <button class="btn-secondary" onclick="window.location.href='chat.html'">
                    ✉️ Повідомлення <span id="globalUnreadBadge" class="msg-badge" style="display: none;">0</span>
                </button>
                <button class="btn-secondary" id="loginBtn" onclick="window.location.href='index.html'">👤 Увійти</button>
                <button class="btn-primary" onclick="window.location.href='index.html'">➕ Головна</button>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div>
            <div class="ad-main-card">
                <div class="gallery-container">
                    <img id="adImage" src="https://via.placeholder.com/800x400?text=Завантаження..." class="gallery-img" alt="Фото">
                </div>
                <div class="ad-price" id="adPrice">0 $</div>
                <h1 class="ad-title" id="adTitle">Завантаження оголошення...</h1>
                <div class="ad-meta" id="adMeta">Опубліковано недавно</div>
                
                <div class="params-box" id="adParams"></div>

                <h3 style="margin-top: 30px; font-size: 18px;">Опис</h3>
                <div class="ad-description" id="adDescription">Зачекайте, дані завантажуються з бази даних.</div>
            </div>
        </div>

        <div>
            <div class="sidebar-panel">
                <div class="author-info">
                    <div class="author-avatar" id="authorAvatar">U</div>
                    <div>
                        <div class="author-name" id="authorName">Продавець</div>
                        <div style="color:var(--olx-gray); font-size:13px;">На OLX здавна</div>
                    </div>
                </div>
                <button class="btn-action" id="btnShowPhone" onclick="revealPhoneNumber()">📞 Показати телефон</button>
                <button class="btn-outline" id="btnStartChat" onclick="initiateChat()">✉️ Написати автору</button>
            </div>
        </div>

        <div class="similar-section">
            <div class="similar-title">Схожі оголошення</div>
            <div class="items-grid" id="similarGrid"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');

        let currentUser = null;
        let myId = null;
        let itemData = null;

        auth.onAuthStateChanged(user => {
            const loginBtn = document.getElementById('loginBtn');
            if(user) {
                currentUser = user; myId = user.uid;
                loginBtn.innerText = `👤 ${user.displayName}`;
                listenToUnreadMessages();
            }
        });

        function listenToUnreadMessages() {
            if(!myId) return;
            db.ref('chats').on('value', snap => {
                let totalUnread = 0;
                snap.forEach(child => {
                    const chat = child.val();
                    if((chat.buyerId === myId || chat.sellerId === myId) && chat.lastSenderId !== myId) {
                        if(chat.unreadCount && chat.unreadCount > 0) totalUnread += chat.unreadCount;
                        else if(chat.unread === true || chat[`unread_${myId}`] === true) totalUnread += 1;
                    }
                });
                const badge = document.getElementById('globalUnreadBadge');
                if(totalUnread > 0) { badge.innerText = totalUnread; badge.style.display = 'inline-flex'; }
                else { badge.style.display = 'none'; }
            });
        }

        if(itemId) {
            db.ref('items/' + itemId).on('value', snap => {
                itemData = snap.val();
                if(!itemData) { document.getElementById('adTitle').innerText = "Оголошення не знайдено"; return; }
                renderItemDetails();
                loadSimilarItems(itemData.category);
            });
        }

        function renderItemDetails() {
            document.getElementById('adTitle').innerText = itemData.name;
            document.getElementById('adPrice').innerText = `${parseFloat(itemData.price).toLocaleString()} $`;
            document.getElementById('adDescription').innerText = itemData.description || 'Опис відсутній.';
            document.getElementById('authorName').innerText = itemData.ownerName || 'Приватна особа';
            document.getElementById('authorAvatar').innerText = (itemData.ownerName || 'U').charAt(0).toUpperCase();
            
            const imgUrl = (itemData.images && itemData.images.length > 0) ? itemData.images[0] : 'https://via.placeholder.com/800x400?text=No+Image';
            document.getElementById('adImage').src = imgUrl;

            const dateStr = itemData.createdAt ? new Date(itemData.createdAt).toLocaleDateString('uk-UA') : 'Недавно';
            document.getElementById('adMeta').innerText = `Категорія: ${itemData.category} • Дата: ${dateStr}`;

            const paramsBox = document.getElementById('adParams');
            paramsBox.innerHTML = `
                <div class="param-badge"><span>Стан:</span> ${itemData.condition || 'Вживане'}</div>
                <div class="param-badge"><span>Тип:</span> ${itemData.sellerType || 'Приватна особа'}</div>
            `;

            if(itemData.category === 'cars') {
                paramsBox.innerHTML += `
                    <div class="param-badge"><span>Марка:</span> ${itemData.brand || 'Не вказано'}</div>
                    <div class="param-badge"><span>Швидкість:</span> ${itemData.speed || '120'} км/год</div>
                    <div class="param-badge"><span>Багажник:</span> ${itemData.trunk || '40'} кг</div>
                `;
            } else if(itemData.category === 'realty') {
                paramsBox.innerHTML += `
                    <div class="param-badge"><span>Кімнат:</span> ${itemData.rooms || '1'}</div>
                    <div class="param-badge"><span>Площа:</span> ${itemData.area || '30'} м²</div>
                `;
            }
        }

        function loadSimilarItems(category) {
            db.ref('items').limitToLast(10).once('value', snap => {
                const grid = document.getElementById('similarGrid');
                grid.innerHTML = ''; let count = 0;
                snap.forEach(child => {
                    const key = child.key; const item = child.val();
                    if(key !== itemId && item.category === category) {
                        count++;
                        const imgUrl = (item.images && item.images.length > 0) ? item.images[0] : 'https://via.placeholder.com/300x170?text=No+Image';
                        grid.innerHTML += `
                            <div class="item-card" onclick="window.location.href='car.html?id=${key}'">
                                <div class="item-img-container"><img src="${imgUrl}" class="item-img" alt="${item.name}"></div>
                                <div class="item-info">
                                    <h4 class="item-card-title">${item.name}</h4>
                                    <div class="item-card-price">${parseFloat(item.price).toLocaleString()} $</div>
                                </div>
                            </div>
                        `;
                    }
                });
                if(count === 0) grid.innerHTML = `<p style="color:var(--olx-gray); grid-column:1/-1;">Схожих оголошень немає.</p>`;
            });
        }

        function revealPhoneNumber() {
            const btn = document.getElementById('btnShowPhone');
            btn.innerText = itemData.phone ? `📞 ${itemData.phone}` : '📞 Номер не вказано';
            btn.style.background = '#e8f7f6'; btn.style.color = 'var(--olx-dark)'; btn.disabled = true;
        }

        function initiateChat() {
            if(!currentUser) { alert('Увійдіть на головній сторінці!'); return; }
            if(myId === itemData.ownerId) { alert('Це ваше власне оголошення!'); return; }

            const chatId = `chat_${itemId}_${myId}`;
            db.ref('chats/' + chatId).update({
                carId: itemId, carTitle: itemData.name,
                buyerId: myId, buyerName: currentUser.displayName, buyerAvatar: currentUser.photoURL || '',
                sellerId: itemData.ownerId, sellerName: itemData.ownerName, sellerAvatar: itemData.ownerAvatar || '',
                lastUpdated: Date.now(), unreadCount: 1, lastSenderId: myId, unread: true
            }).then(() => { window.location.href = `chat.html?id=${chatId}`; });
        }
    </script>
</body>
</html>
